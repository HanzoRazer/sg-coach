name: sg-coach Vectors Gate

on:
  pull_request:
    branches: [main, master]
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  vectors:
    name: sg-coach vectors gate
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install package
        run: pip install -e .

      - name: SGC_VECTORS_COMPLETE_GATE
        run: |
          python scripts/ci/check_sg_coach_vectors_complete.py tests/golden

      - name: SGC_REPLAY_DETERMINISM_GATE
        run: |
          python scripts/ci/check_sg_coach_replay_determinism.py \
            --repo-root . \
            --fixtures tests/golden \
            --seed 123

      - name: Smoke (import sg_coach)
        run: |
          python -c "import sg_coach; print('sg_coach import OK')"
